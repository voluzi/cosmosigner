name: Feature request
description: Suggest an improvement for Cosmosigner
title: "feat: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Please keep feature requests public-safe. Do not include private infrastructure details or credentials.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior or API you would like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional alternatives or trade-offs.
